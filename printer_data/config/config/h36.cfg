[mcu H36_combo]
#serial: /dev/serial/by-path/*
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_3F0045000950415742363820-if00
#canbus_uuid=e185794c4226

# CAN_RX: PD0
# CAN_TX: PD1
# CAN USB switch: PA2
# logic Low = COM to A PORT  CANBUS 
# Logic High = COM to B PORT  USB

#####################################################################
# Input Shaper
#####################################################################

# [adxl345]
