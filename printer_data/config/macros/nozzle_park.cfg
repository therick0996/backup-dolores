#####################################################################
##   Nozzle Park
#####################################################################
[gcode_macro NOZZLE_PARK]
variable_start_x: 142
variable_start_y: 245
variable_start_z: 5.0
variable_raise_distance: 10
variable_travel_speed: 15000  # 250mm/s

gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28 X Y Z
    {% endif %}

 ## Raise nozzle
    _CLIENT_LINEAR_MOVE Z={raise_distance} F=800 ABSOLUTE=0
    # G1 Z{raise_distance}

## Move nozzle to start position
    # _CLIENT_LINEAR_MOVE X={start_x} Y={start_y} F={travel_speed} ABSOLUTE=1
    G90                           # absolute positioning
    G1 F{travel_speed}               # set travel speed
    G1 X{start_x-20} Y{start_y}   # move to the left of position
    G1 X{start_x}                 # move to position
    # G1 Z{start_z} F1500