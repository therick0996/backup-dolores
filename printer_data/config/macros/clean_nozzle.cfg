#####################################################################
##   Clean nozzle
#####################################################################
[gcode_macro CLEAN_NOZZLE]
variable_start_x: 150
variable_start_y: 245
variable_start_z: 5.0
variable_wipe_dist: 30
variable_wipe_qty: 10
variable_wipe_spd: 350
variable_raise_distance: 10
variable_travel_speed: 15000  # 250mm/s

gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
      G28 X Y Z
    {% endif %}

 ## Raise nozzle
    _CLIENT_LINEAR_MOVE Z={raise_distance} F=800 ABSOLUTE=0
    # G1 Z{raise_distance}

## Move nozzle to start position
    # _CLIENT_LINEAR_MOVE X={start_x} Y={start_y} F={travel_speed} ABSOLUTE=1
    G90                           # absolute positioning
    G1 F{travel_speed}            # set travel speed
    G1 X{start_x-20} Y{start_y}   # move 20mm away from start
    G1 X{start_x}                 # move to start
    # G1 Z{start_z} F1500

## Wipe nozzle
    {% for wipes in range(1, (wipe_qty + 1)) %}
      G90
      G1 X{start_x + wipe_dist} F{wipe_spd * 60}
      G1 X{start_x} F{wipe_spd * 60}
    {% endfor %}

# gcode:
#     G1 X160 Y242 F12000     # move to position
#     G91                     # relative positioning
#     G1 X40                  # move 40 right
#     G1 X-30                 # move 30 left
#     G1 X30                  # move 30 right
#     G1 X-30                 # move 30 left
#     G1 X30                  # move 30 right
#     G1 X-30                 # move 30 left
#     G1 X30                  # move 30 right
#     G1 X-30                 # move 30 left
#     G1 X30                  # move 30 right
#     G90                     # absolute position
    
